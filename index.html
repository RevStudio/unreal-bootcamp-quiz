<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unreal Bootcamp - 특강 성향 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a28;
    --bg-card-hover: #222236;
    --accent-blue: #00b4d8;
    --accent-purple: #7b2ff7;
    --accent-cyan: #00f5d4;
    --accent-orange: #ff6b35;
    --accent-pink: #f72585;
    --text-primary: #e8e8f0;
    --text-secondary: #9090a8;
    --text-dim: #606078;
    --border: #2a2a3e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-grid {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(123, 47, 247, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123, 47, 247, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(120px);
    pointer-events: none; z-index: 0;
  }
  .bg-orb-1 { width: 600px; height: 600px; background: rgba(123,47,247,0.08); top: -200px; right: -100px; }
  .bg-orb-2 { width: 500px; height: 500px; background: rgba(0,180,216,0.06); bottom: -150px; left: -100px; }

  .container {
    position: relative; z-index: 1;
    max-width: 820px; margin: 0 auto; padding: 40px 20px;
  }

  /* ── INTRO ── */
  .intro { text-align: center; animation: fadeUp 0.8s ease; }

  .intro-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(123, 47, 247, 0.15);
    border: 1px solid rgba(123, 47, 247, 0.3);
    border-radius: 100px; padding: 8px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--accent-purple);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 32px;
  }
  .intro-badge::before {
    content: ''; width: 6px; height: 6px;
    background: var(--accent-purple); border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .intro h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(26px, 5vw, 44px); font-weight: 900;
    line-height: 1.3; margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 0%, var(--accent-blue) 50%, var(--accent-purple) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .intro h2 {
    font-size: clamp(15px, 2.5vw, 20px); font-weight: 400;
    color: var(--text-secondary); margin-bottom: 48px; line-height: 1.7;
  }

  .track-preview {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
    gap: 12px; margin-bottom: 48px;
  }
  .track-chip {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 12px; text-align: center;
  }
  .track-chip .icon { font-size: 28px; margin-bottom: 8px; }
  .track-chip .label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }

  .btn-start {
    display: inline-flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
    color: #fff; border: none; border-radius: 16px;
    padding: 20px 48px; font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px; font-weight: 700; cursor: pointer;
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .btn-start::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%); transition: transform 0.6s;
  }
  .btn-start:hover::before { transform: translateX(100%); }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(123, 47, 247, 0.4); }

  /* ── PROGRESS ── */
  .progress-area { margin-bottom: 40px; animation: fadeUp 0.5s ease; }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
  }
  .progress-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); }
  .progress-count { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--accent-cyan); }
  .progress-track { height: 4px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue), var(--accent-cyan));
    border-radius: 4px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── QUESTION ── */
  .question-card { animation: fadeUp 0.5s ease; }
  .q-number {
    font-family: 'Orbitron', sans-serif; font-size: 12px;
    color: var(--accent-purple); letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .q-text {
    font-size: clamp(19px, 3.2vw, 26px); font-weight: 700;
    line-height: 1.5; margin-bottom: 8px; color: #fff;
  }
  .q-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; }
  .options { display: flex; flex-direction: column; gap: 12px; }

  .option-btn {
    display: flex; align-items: flex-start; gap: 16px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px 24px; cursor: pointer;
    transition: all 0.3s ease; text-align: left; width: 100%;
    font-family: 'Noto Sans KR', sans-serif; color: var(--text-primary);
    font-size: 15px; line-height: 1.6; position: relative; overflow: hidden;
  }
  .option-btn::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: transparent; transition: background 0.3s;
  }
  .option-btn:hover {
    background: var(--bg-card-hover); border-color: rgba(123, 47, 247, 0.4);
    transform: translateX(4px);
  }
  .option-btn:hover::before {
    background: linear-gradient(to bottom, var(--accent-purple), var(--accent-blue));
  }
  .option-key {
    flex-shrink: 0; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(123, 47, 247, 0.1); border: 1px solid rgba(123, 47, 247, 0.2);
    border-radius: 8px; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 700; color: var(--accent-purple);
  }
  .option-btn:hover .option-key { background: rgba(123, 47, 247, 0.2); border-color: var(--accent-purple); }
  .option-btn.selected { background: rgba(123, 47, 247, 0.1); border-color: var(--accent-purple); }
  .option-btn.selected::before { background: var(--accent-purple); }
  .option-btn.selected .option-key { background: var(--accent-purple); color: #fff; }

  /* ── RESULT ── */
  .result { text-align: center; animation: fadeUp 0.8s ease; }
  .result-badge {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent-cyan); margin-bottom: 16px;
  }
  .result h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(22px, 4.5vw, 36px); font-weight: 900; margin-bottom: 8px;
  }
  .result-subtitle {
    font-size: 15px; color: var(--text-secondary);
    margin-bottom: 40px; line-height: 1.6;
  }

  .result-main-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px; margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .result-main-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .result-main-card.client::before { background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }
  .result-main-card.ta::before { background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink)); }
  .result-main-card.planning::before { background: linear-gradient(90deg, var(--accent-orange), #ffd60a); }
  .result-main-card.digital::before { background: linear-gradient(90deg, var(--accent-cyan), #2ec4b6); }

  .result-icon { font-size: 56px; margin-bottom: 16px; }
  .result-title {
    font-family: 'Orbitron', sans-serif; font-size: 22px;
    font-weight: 700; margin-bottom: 16px;
  }
  .result-desc {
    font-size: 15px; color: var(--text-secondary);
    line-height: 1.9; margin-bottom: 24px; text-align: left;
  }
  .result-desc strong { color: var(--text-primary); }
  .result-tags {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 8px; margin-bottom: 24px;
  }
  .result-tag {
    padding: 6px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 500;
  }
  .result-tag.c0 { background: rgba(0,180,216,0.1); color: var(--accent-blue); border: 1px solid rgba(0,180,216,0.2); }
  .result-tag.c1 { background: rgba(123,47,247,0.1); color: var(--accent-purple); border: 1px solid rgba(123,47,247,0.2); }
  .result-tag.c2 { background: rgba(255,107,53,0.1); color: var(--accent-orange); border: 1px solid rgba(255,107,53,0.2); }
  .result-tag.c3 { background: rgba(0,245,212,0.1); color: var(--accent-cyan); border: 1px solid rgba(0,245,212,0.2); }

  .result-tip {
    font-size: 14px; color: var(--accent-cyan);
    line-height: 1.7; padding: 16px; border-radius: 12px;
    background: rgba(0, 245, 212, 0.05);
    border: 1px solid rgba(0, 245, 212, 0.1);
    text-align: left;
  }

  .score-section {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; margin-bottom: 24px; text-align: left;
  }
  .score-section h3 {
    font-size: 14px; font-weight: 500; color: var(--text-dim);
    margin-bottom: 20px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .score-item { margin-bottom: 16px; }
  .score-item:last-child { margin-bottom: 0; }
  .score-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .score-name { font-size: 14px; font-weight: 500; }
  .score-pct { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; }
  .score-bar-bg { height: 8px; background: rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 8px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
  .score-bar-fill.c0 { background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }
  .score-bar-fill.c1 { background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink)); }
  .score-bar-fill.c2 { background: linear-gradient(90deg, var(--accent-orange), #ffd60a); }
  .score-bar-fill.c3 { background: linear-gradient(90deg, var(--accent-cyan), #2ec4b6); }

  .runner-up-card {
    background: var(--bg-card); border: 1px solid rgba(255,107,53,0.2);
    border-radius: 16px; padding: 24px; margin-bottom: 24px; text-align: left;
  }
  .runner-up-card h3 {
    font-size: 14px; font-weight: 500; color: var(--accent-orange);
    margin-bottom: 12px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .runner-up-card p {
    font-size: 14px; color: var(--text-secondary); line-height: 1.7;
  }
  .runner-up-card strong { color: var(--text-primary); }

  .btn-retry {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-primary); border-radius: 12px;
    padding: 16px 36px; font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.3s;
    margin-top: 12px;
  }
  .btn-retry:hover { border-color: var(--accent-purple); background: var(--bg-card-hover); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .container { padding: 24px 16px; }
    .option-btn { padding: 16px 16px; font-size: 14px; }
    .result-main-card { padding: 24px 16px; }
    .track-preview { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="container">
  <div id="intro" class="intro">
    <div class="intro-badge">Unreal Engine Bootcamp</div>
    <h1>나에게 맞는<br>특강은 뭘까?</h1>
    <h2>10개의 성향 질문을 통해<br>당신에게 딱 맞는 특강 트랙을 찾아드립니다</h2>
    <div class="track-preview">
      <div class="track-chip"><div class="icon">⌨️</div><div class="label">클라이언트 개발자</div></div>
      <div class="track-chip"><div class="icon">🎨</div><div class="label">테크니컬 아티스트</div></div>
      <div class="track-chip"><div class="icon">🎯</div><div class="label">게임 기획</div></div>
      <div class="track-chip"><div class="icon">🌐</div><div class="label">디지털트윈·VP</div></div>
    </div>
    <button class="btn-start" onclick="startQuiz()">성향 테스트 시작 →</button>
  </div>

  <div id="quiz" class="hidden">
    <div class="progress-area">
      <div class="progress-header">
        <span class="progress-label">PROGRESS</span>
        <span class="progress-count" id="progressCount">1 / 10</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 10%"></div>
      </div>
    </div>
    <div class="question-card" id="questionCard"></div>
  </div>

  <div id="result" class="result hidden"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// scores: [client, ta, planning, digital]
// 질문 설계: 직무명·기술 키워드 없이 일상 성향으로 간접 측정
// ═══════════════════════════════════════════════════════

const questions = [
  {
    q: "친구가 \"이거 왜 이렇게 되는 거야?\"라고 물었을 때, 당신의 첫 반응은?",
    sub: "평소 습관대로 골라주세요",
    options: [
      { text: "직접 열어보고 원인을 찾아 고쳐준다", scores: [4, 1, 0, 2] },
      { text: "\"이 부분을 이렇게 바꾸면 훨씬 나을 텐데\" 라며 개선안을 제안한다", scores: [0, 4, 0, 1] },
      { text: "\"애초에 이런 구조로 만들었으면 안 그랬을 텐데\" 라며 설계를 지적한다", scores: [1, 0, 4, 1] },
      { text: "비슷한 사례를 찾아보고 데이터로 비교해서 설명해준다", scores: [2, 0, 1, 4] }
    ]
  },
  {
    q: "유튜브를 켰을 때, 무의식적으로 클릭하게 되는 영상은?",
    sub: "알고리즘이 당신을 가장 잘 압니다",
    options: [
      { text: "복잡한 장치나 시스템이 착착 맞물려 돌아가는 영상", scores: [4, 1, 0, 2] },
      { text: "색감과 비주얼이 압도적으로 아름다운 영상", scores: [0, 4, 0, 1] },
      { text: "\"왜 이게 성공했을까\" 류의 분석·해설 영상", scores: [0, 0, 4, 1] },
      { text: "미래 기술이나 현실 산업의 비하인드를 다룬 다큐", scores: [1, 1, 0, 4] }
    ]
  },
  {
    q: "레고 세트를 받았습니다. 당신의 스타일은?",
    sub: "어릴 때 기억을 떠올려도 좋아요",
    options: [
      { text: "설명서 없이 끼워보면서 돌아가는 구조를 직접 만든다", scores: [4, 0, 1, 1] },
      { text: "완성했을 때 색 배치와 외형이 예쁘게 나오도록 공들인다", scores: [0, 4, 1, 0] },
      { text: "\"이걸로 뭘 만들면 제일 재밌을까?\" 아이디어를 먼저 궁리한다", scores: [0, 0, 4, 1] },
      { text: "실제 건물이나 기계를 최대한 정확하게 재현하려고 한다", scores: [1, 1, 0, 4] }
    ]
  },
  {
    q: "조별 과제에서 자연스럽게 맡게 되는 포지션은?",
    sub: "억지가 아닌, 자연스럽게 맡는 역할을 떠올려보세요",
    options: [
      { text: "결과물을 직접 만드는 실무 담당", scores: [4, 2, 0, 1] },
      { text: "발표 자료의 디자인과 비주얼 완성도를 책임지는 역할", scores: [0, 4, 1, 0] },
      { text: "전체 방향을 잡고, 누가 뭘 할지 정리하는 역할", scores: [0, 0, 4, 1] },
      { text: "자료 조사와 팩트 체크를 꼼꼼하게 하는 역할", scores: [2, 0, 1, 4] }
    ]
  },
  {
    q: "새로운 앱을 처음 깔았을 때, 무의식적으로 보는 것은?",
    sub: "첫 3분간의 행동 패턴을 떠올려보세요",
    options: [
      { text: "\"이건 내부적으로 어떻게 돌아가는 거지?\" 구조가 궁금해진다", scores: [4, 1, 0, 2] },
      { text: "화면 전환이 매끄러운지, 디자인이 정돈되어 있는지 먼저 확인한다", scores: [0, 4, 0, 1] },
      { text: "메뉴 흐름이 직관적인지, 어디서 막히는지를 파악한다", scores: [1, 0, 4, 0] },
      { text: "\"이 기술을 다른 데에도 쓸 수 있겠는데\" 하는 생각이 먼저 든다", scores: [1, 0, 1, 4] }
    ]
  },
  {
    q: "다음 중, 들었을 때 가장 기분이 좋은 칭찬은?",
    sub: "정답은 없어요 — 솔직하게 골라주세요",
    options: [
      { text: "\"너 진짜 꼼꼼하고 끈기 있다\"", scores: [4, 1, 0, 2] },
      { text: "\"너 감각이 진짜 좋다, 센스 있어\"", scores: [0, 4, 1, 0] },
      { text: "\"너 아이디어가 진짜 기발하다\"", scores: [0, 1, 4, 0] },
      { text: "\"너 시야가 넓어서 큰 그림을 잘 본다\"", scores: [1, 0, 1, 4] }
    ]
  },
  {
    q: "마감 전날, 결과물에서 아쉬운 부분을 발견했습니다.",
    sub: "현실의 나라면 어떻게 할까요?",
    options: [
      { text: "밤새서라도 직접 고쳐서, 제대로 작동하는 걸 확인한다", scores: [4, 1, 0, 1] },
      { text: "겉으로 보이는 완성도가 떨어지는 건 참을 수 없어서, 비주얼부터 다듬는다", scores: [0, 4, 1, 0] },
      { text: "원인을 파악하고, 지금 고칠 것 / 나중에 고칠 것을 우선순위로 나눈다", scores: [1, 0, 4, 1] },

const trackKeys = ["client", "ta", "planning", "digital"];
const trackNames = ["클라이언트 개발자", "테크니컬 아티스트", "게임 기획", "디지털트윈·VP"];

let currentQ = 0;
let scores = [0, 0, 0, 0];

function startQuiz() {
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  currentQ = 0;
  scores = [0, 0, 0, 0];
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const card = document.getElementById('questionCard');
  document.getElementById('progressFill').style.width = ((currentQ + 1) / questions.length * 100) + '%';
  document.getElementById('progressCount').textContent = (currentQ + 1) + ' / ' + questions.length;

  const keys = ['A', 'B', 'C', 'D'];
  card.innerHTML = `
    <div class="q-number">Question ${String(currentQ + 1).padStart(2, '0')}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-sub">${q.sub}</div>
    <div class="options">
      ${q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectOption(${i})">
          <span class="option-key">${keys[i]}</span>
          <span>${opt.text}</span>
        </button>
      `).join('')}
    </div>
  `;
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = 'fadeUp 0.4s ease';
}

function selectOption(idx) {
  const optScores = questions[currentQ].options[idx].scores;

  // 클라이언트 개발자 1.12x 가중치
  scores[0] += optScores[0] * 1.12;
  scores[1] += optScores[1];
  scores[2] += optScores[2];
  scores[3] += optScores[3];

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.classList.remove('selected'));
  btns[idx].classList.add('selected');

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) renderQuestion();
    else showResult();
  }, 350);
}

function showResult() {
  document.getElementById('quiz').classList.add('hidden');
  const resultDiv = document.getElementById('result');
  resultDiv.classList.remove('hidden');

  const total = scores.reduce((a, b) => a + b, 0);
  const pcts = scores.map(s => Math.round(s / total * 100));

  let maxIdx = 0;
  scores.forEach((s, i) => { if (s > scores[maxIdx]) maxIdx = i; });

  const winnerKey = trackKeys[maxIdx];
  const winner = results[winnerKey];

  const sorted = trackKeys.map((k, i) => ({ key: k, idx: i, score: scores[i], pct: pcts[i] }))
    .sort((a, b) => b.score - a.score);

  const runnerUp = results[sorted[1].key];
  const isClose = sorted[0].pct - sorted[1].pct <= 8;

  resultDiv.innerHTML = `
    <div class="result-badge">// ANALYSIS COMPLETE</div>
    <h2>당신의 추천 특강은</h2>
    <div class="result-subtitle">10개 질문으로 분석한 당신의 성향 결과입니다</div>

    <div class="result-main-card ${winner.color}">
      <div class="result-icon">${winner.icon}</div>
      <div class="result-title">${winner.title}</div>
      <div class="result-desc">${winner.desc}</div>
      <div class="result-tags">
        ${winner.tags.map(t => `<span class="result-tag ${winner.tagClass}">${t}</span>`).join('')}
      </div>
      <div class="result-tip">${winner.tip}</div>
    </div>

    <div class="score-section">
      <h3>전체 성향 분석</h3>
      ${sorted.map((item, rank) => `
        <div class="score-item">
          <div class="score-label">
            <span class="score-name">${rank === 0 ? '🏆 ' : ''}${trackNames[item.idx]}</span>
            <span class="score-pct" style="color: var(${results[item.key].colorVar})">${item.pct}%</span>
          </div>
          <div class="score-bar-bg">
            <div class="score-bar-fill c${item.idx}" style="width: 0%;" data-width="${item.pct}%"></div>
          </div>
        </div>
      `).join('')}
    </div>

    ${isClose ? `
      <div class="runner-up-card">
        <h3>⚡ 2순위도 확인해보세요</h3>
        <p>1위와 2위의 차이가 크지 않습니다! <strong>${runnerUp.title}</strong> 특강도 당신의 성향과 잘 맞을 수 있어요. 두 트랙의 커리큘럼을 비교해보고 최종 결정하시는 것을 추천드립니다.</p>
      </div>
    ` : ''}

    <button class="btn-retry" onclick="retry()">↻ 다시 테스트하기</button>
  `;

  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.width;
    });
  }, 200);
}

function retry() {
  document.getElementById('result').classList.add('hidden');
  document.getElementById('intro').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
